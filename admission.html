<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Admission | SKSS Inter College</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial}
body{
margin:0;
background:#f4f7fb;
}

/* NAVBAR */
nav{
background:#081f37;
padding:14px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}
nav a{
color:white;
text-decoration:none;
font-weight:700;
margin:0 10px;
}

/* FORM */
.container{
max-width:820px;
margin:40px auto;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}
h1{
text-align:center;
color:#081f37;
margin-bottom:30px;
}
form{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}
input,select,textarea{
padding:14px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
width:100%;
}
textarea{grid-column:1/3}
button{
grid-column:1/3;
padding:16px;
background:#081f37;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
button:hover{background:#06172b}

/* SUCCESS */
.success{
display:none;
text-align:center;
padding:40px;
}
.success h2{color:green}

/* RESPONSIVE */
@media(max-width:700px){
form{grid-template-columns:1fr}
textarea,button{grid-column:1}
}
</style>
</head>

<body>

<nav>
<div style="color:white;font-weight:900">SKSS INTER COLLEGE</div>
<div>
<a href="index.html">Home</a>
<a href="admission.html">Online Admission</a>
</div>
</nav>

<div class="container" id="formBox">
<h1>Online Admission Form</h1>

<form onsubmit="submitForm(event)">
<input type="text" required placeholder="Student Name">
<input type="text" required placeholder="Father's Name">
<input type="text" required placeholder="Mother's Name">
<input type="number" required placeholder="Mobile Number">
<select required>
<option value="">Select Class</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
</select>
<input type="date" required>
<textarea rows="3" placeholder="Full Address" required></textarea>
<button type="submit">Submit Admission</button>
</form>
</div>

<div class="container success" id="successBox">
<h2>Admission Submitted Successfully 🎉</h2>
<p>Our team will contact you shortly.</p>
<a href="index.html">← Go Back to Home</a>
</div>

<script>
function submitForm(e){
e.preventDefault();
document.getElementById("formBox").style.display="none";
document.getElementById("successBox").style.display="block";
}
</script>

</body>
</html>
