<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:Arial;background:#eef2f6}
.panel{

background:#fff;padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,.25)
}
h2{text-align:center;color:#0b3c5d}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{
padding:12px;border:1px solid #ccc;
text-align:center
}
th{background:#0b3c5d;color:#fff}
</style>
</head>

<body>

</html>
